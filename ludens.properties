# Ludens settings
# Read by build-logic in `LudensSettingsConfiguration` and
# converted into the generated `LudensSettingsPreset.kt`.

# ----- Settings -----

# Selects the default generated preset used by the app build.
# If this is `custom`, the values below are read instead of the built-in preset.
ludens.settings.presetName=recommended

# Preset raw values used when `ludens.settings.presetName=custom`.
# Boolean values accept `true/false`, `1/0`, `yes/no` and `on/off`.

# Default mute state for the tools overlay.
ludens.settings.preset.toolMuted=false

# Default visibility for the FPS counter.
ludens.settings.preset.toolShowFps=false

# Default WebGL switch state.
ludens.settings.preset.toolUseWebgl=false

# Default state for the virtual controls.
ludens.settings.preset.controlEnabled=true

# Virtual control opacity. Valid range: `0.0` to `1.0`.
# Used by the generated settings preset and the runtime UI.
ludens.settings.preset.controlAlpha=0.4

# Default state for the quick actions panel.
# When enabled, the generated preset exposes the configured action items.
ludens.settings.preset.actionEnabled=false

# Quick action items shown in the quick actions panel.
# Separator rules: comma, pipe or semicolon.
# Valid values currently used by the app: `settings`, `controls`, `mute`, `fps`, `webgl`.
ludens.settings.preset.actionItems=settings

# Default system theme fallback.
# Consumed by the runtime settings flow when the app has no explicit theme override.
ludens.settings.preset.systemTheme=system

# Default system language fallback.
# Consumed by the runtime settings flow when the app has no explicit language override.
ludens.settings.preset.systemLanguage=system

# ----- Android Identity -----

# Android application identity.
# Read by `LudensAndroidConfiguration` and applied by `composeApp/build.gradle.kts`.
# These values define the package name, version and labels shown by Android.

# Android application id.
ludens.android.id=com.ludens.compose.ludens

# Android version name.
# This is the visible version shown by Android, not the integer versionCode.
ludens.android.version=0.2.0

# Android version code.
# This is an integer used by Android to determine update compatibility.
# It should be incremented with every release, but does not have to match the version name.
ludens.android.versionCode=1

# Application details name shown in Android settings.
ludens.android.name=Ludens

# Launcher label shown below the icon.
ludens.android.launcherName=Ludens

# Application immersive mode
ludens.android.immersive=true

# ----- Android Manifest -----

# Android manifest defaults.
# These values are consumed by the manifest generation / placeholder flow.

# Whether Android can back up app data.
# Maps to `android:allowBackup`.
ludens.android.manifest.allowBackup=true

# Requests a larger heap for the process.
# Maps to `android:largeHeap`.
ludens.android.manifest.largeHeap=true

# Enables hardware acceleration on the application window.
# Maps to `android:hardwareAccelerated`.
ludens.android.manifest.hardwareAccelerated=true

# Activity orientation used by the app entry point.
# Maps to `android:screenOrientation`.
# Common values: `sensorLandscape`, `landscape`, `portrait`, `fullSensor`.
ludens.android.manifest.screenOrientation=sensorLandscape

# Allows cleartext HTTP traffic.
# Maps to `android:usesCleartextTraffic`.
# Keep this disabled unless the game or web assets require HTTP.
ludens.android.manifest.usesCleartextTraffic=false

# Allows the activity to be resized by the system.
# Maps to `android:resizeableActivity`.
ludens.android.manifest.resizeableActivity=false

# ----- Android Permissions -----

# Android permissions defaults.
# These are read by the permissions manifest generator.

# Grants network access.
# Maps to `android.permission.INTERNET`.
# Usually required for Ludens because the game is loaded through WebView.
ludens.android.permissions.internet=false

# Grants access to connectivity state.
# Maps to `android.permission.ACCESS_NETWORK_STATE`.
ludens.android.permissions.networkState=false

# Lets the app keep the CPU awake while rendering or loading.
# Maps to `android.permission.WAKE_LOCK`.
ludens.android.permissions.wakeLock=false

# Grants access to Wi-Fi connection state.
# Maps to `android.permission.ACCESS_WIFI_STATE`.
ludens.android.permissions.accessWifiState=false

# Grants permission to change Wi-Fi state.
# Maps to `android.permission.CHANGE_WIFI_STATE`.
ludens.android.permissions.changeWifiState=false
